<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Vazirmatn:wght@400;500;600;700&family=Lalezar&family=Markazi+Text:wght@400;500;600;700&family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"> 
  <title>Slide Show</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; */
      font-family: 'poppins', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: #e8e8ee;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: stretch;
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #1c1c24;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 300;
      transition: margin-left 0.3s ease;
    }

    .sidebar.collapsed {
      margin-left: -240px;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sidebar-header h3 {
      color: #a0a0b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .sidebar-header span {
      color: #5a5a72;
      font-size: 0.75rem;
    }

    .sidebar-close {
      background: none;
      border: none;
      color: #5a5a72;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }

    .sidebar-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e0e0f0;
    }

    .sidebar-thumbnails {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sidebar-thumbnails::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-thumbnails::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-thumbnails::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    .sidebar-add-btn {
      margin: 0.5rem 0.75rem 0.75rem;
      padding: 0.55rem;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      color: #6b7280;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .sidebar-add-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.2);
      color: #a0a0b8;
    }

    .thumb-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem;
      border-radius: 0.5rem;
      cursor: grab;
      transition: background 0.2s, transform 0.15s;
      border: 2px solid transparent;
      user-select: none;
    }

    .thumb-item:active {
      cursor: grabbing;
    }

    .thumb-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .thumb-item.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: #6366f1;
    }

    .thumb-item.dragging {
      opacity: 0.3;
    }

    .thumb-del-btn {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #2a2a36;
      color: #a0a0b8;
      font-size: 0.65rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      z-index: 2;
      font-family: inherit;
    }

    .thumb-del-btn:hover {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
    }

    .thumb-item:hover .thumb-del-btn {
      display: flex;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .confirm-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .confirm-box {
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      padding: 1.5rem;
      max-width: 340px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .confirm-box p {
      color: #e2e8f0;
      font-size: 0.95rem;
      margin: 0 0 1.25rem;
      line-height: 1.5;
    }

    .confirm-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .confirm-actions button {
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s, opacity 0.2s;
      font-family: inherit;
    }

    .confirm-actions .btn-cancel {
      background: rgba(255, 255, 255, 0.06);
      color: #a0a0b8;
    }

    .confirm-actions .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .confirm-actions .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
    }

    .confirm-actions .btn-danger:hover {
      opacity: 0.9;
    }

    .drop-placeholder {
      height: 4px;
      margin: 2px 0;
      border-radius: 4px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      opacity: 0.7;
      transition: height 0.1s;
      flex-shrink: 0;
    }

    .thumb-preview {
      width: 72px;
      min-width: 72px;
      height: 48px;
      border-radius: 0.375rem;
      background-size: cover;
      background-position: center;
      background-color: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-preview .thumb-placeholder {
      font-size: 1rem;
      opacity: 0.2;
      color: #fff;
    }

    .thumb-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }

    .thumb-info .thumb-label {
      font-size: 0.8rem;
      color: #d0d0e0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thumb-info .thumb-desc {
      font-size: 0.7rem;
      color: #5a5a72;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
    }

    .slideshow-container {
      position: relative;
      width: 95%;
      max-width: 1400px;
      height: 92vh;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
    }

    .slide-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      transform: scale(0.95);
      pointer-events: none;
      overflow: hidden;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .slide.exit-prev {
      opacity: 0;
      transform: translateX(-40px) scale(0.95);
    }

    .slide.exit-next {
      opacity: 0;
      transform: translateX(40px) scale(0.95);
    }

    .slide.drag-over {
      outline: 3px dashed #818cf8;
      outline-offset: -12px;
    }

    .slide-img-wrap {
      position: absolute;
      cursor: move;
      z-index: 5;
      display: none;
      pointer-events: auto;
    }

    .slide-img-wrap.selected {
      outline: 2px solid #6366f1;
      outline-offset: 0px;
    }

    .slide-img-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .resize-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #fff;
      border: 2px solid #6366f1;
      border-radius: 2px;
      z-index: 10;
      pointer-events: auto;
      display: none;
    }

    .slide-img-wrap.selected .resize-handle {
      display: block;
    }

    .fullscreen .slide-img-wrap.selected {
      outline: none;
    }

    .fullscreen .slide-img-wrap.selected .resize-handle {
      display: none !important;
    }

    .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
    .resize-handle.n  { top: -6px; left: calc(50% - 6px); cursor: n-resize; }
    .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
    .resize-handle.e  { top: calc(50% - 6px); right: -6px; cursor: e-resize; }
    .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
    .resize-handle.s  { bottom: -6px; left: calc(50% - 6px); cursor: s-resize; }
    .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
    .resize-handle.w  { top: calc(50% - 6px); left: -6px; cursor: w-resize; }

    .img-props {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 25;
      display: none;
      gap: 0.25rem;
      background: rgba(28, 28, 36, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.5rem;
      padding: 0.3rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .slide-img-wrap.selected ~ .img-props,
    .slide-img-wrap.selected + .img-props {
      display: flex;
    }

    .img-props button {
      background: transparent;
      border: none;
      color: #6b7280;
      padding: 0.3rem 0.6rem;
      border-radius: 0.3rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .img-props button:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #c0c0d8;
    }

    .img-props button.active {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
    }

    .fullscreen .img-props {
      display: none !important;
    }

    .slide .slide-label {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.875rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.3rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      letter-spacing: 0.02em;
      z-index: 20;
      user-select: none;
      pointer-events: none;
    }

    .slide .slide-number {
      position: absolute;
      bottom: 2rem;
      right: 2.5rem;
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.35);
      font-variant-numeric: tabular-nums;
      z-index: 20;
      user-select: none;
      pointer-events: none;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #c0c0d8;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
      z-index: 100;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .nav-arrow:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .nav-arrow.prev { left: 1.5rem; }
    .nav-arrow.next { right: 1.5rem; }

    .nav-arrow:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
      transition: width 0.4s ease;
      z-index: 200;
    }

    .dots {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 150;
    }

    .dots .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dots .dot.active {
      background: #818cf8;
      transform: scale(1.4);
    }

    .dots .dot:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .settings-btn {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a0a0b8;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
      z-index: 200;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .fullscreen-btn {
      position: absolute;
      top: 1.25rem;
      right: 3.75rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #a0a0b8;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
      z-index: 200;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .fallback-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 1;
    }

    .fallback-msg .fallback-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .fallback-msg .fallback-box .fb-num {
      font-size: 3rem;
      color: #d4d4d7;
      line-height: 1.1;
      font-weight: 500;
    }

    .fallback-msg .fallback-box .fb-label {
      font-size: 0.85rem;
      color: #d4d4d7;
      text-align: center;
      line-height: 1.5;
      max-width: 240px;
    }

    .sidebar-toggle {
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 400;
      background: rgba(28, 28, 36, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #c0c0d0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-toggle:hover {
      background: rgba(28, 28, 36, 1);
      color: #fff;
    }

    .sidebar.collapsed ~ .sidebar-toggle {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.25rem;
      width: 90%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .modal-header h2 {
      color: #f1f5f9;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      transition: color 0.2s;
    }

    .modal-close:hover { color: #f1f5f9; }

    .modal-body {
      padding: 1rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body::-webkit-scrollbar {
      width: 4px;
    }

    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .slide-setting {
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .slide-setting:last-child {
      border-bottom: none;
    }

    .slide-setting label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .slide-setting input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.5rem;
      padding: 0.6rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .slide-setting input:focus {
      border-color: #6366f1;
    }

    .slide-setting input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .slide-setting .preview-thumb {
      width: 100%;
      height: 80px;
      border-radius: 0.5rem;
      margin-top: 0.5rem;
      background-size: cover;
      background-position: center;
      background-color: rgba(255, 255, 255, 0.03);
      display: none;
    }

    .slide-setting .preview-thumb.show {
      display: block;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .modal-footer button {
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s, opacity 0.2s;
      font-family: inherit;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.06);
      color: #a0a0b8;
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-save {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
    }

    .btn-save:hover {
      opacity: 0.9;
    }

    .add-slide-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      color: #6b7280;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      font-family: inherit;
    }

    .add-slide-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.2);
      color: #a0a0b8;
    }

    .remove-slide-btn {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      margin-left: 0.5rem;
      transition: color 0.2s;
      font-family: inherit;
    }

    .remove-slide-btn:hover { color: #ef4444; }

    .slide-setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    @media (max-width: 900px) {
      .sidebar.collapsed {
        margin-left: -240px;
      }

      .nav-arrow { width: 40px; height: 40px; font-size: 1rem; }
      .nav-arrow.prev { left: 0.75rem; }
      .nav-arrow.next { right: 0.75rem; }
      .dots { bottom: 1.5rem; }
      .modal { width: 95%; max-height: 90vh; }
    }
  </style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-left">
      <h3>Slides</h3>
      <span id="slideCount">1</span>
    </div>
    <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&times;</button>
  </div>
  <div class="sidebar-thumbnails" id="thumbnails"></div>
  <button class="sidebar-add-btn" id="sidebarAddBtn">+ New Slide</button>
</div>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>

<div class="main-area">
  <div class="slideshow-container" id="slideshow">
    <div class="slide active" data-slide="0">
      <div class="slide-img-wrap">
        <img alt="" draggable="false">
        <div class="resize-handle nw"></div>
        <div class="resize-handle n"></div>
        <div class="resize-handle ne"></div>
        <div class="resize-handle e"></div>
        <div class="resize-handle se"></div>
        <div class="resize-handle s"></div>
        <div class="resize-handle sw"></div>
        <div class="resize-handle w"></div>
      </div>
      <div class="img-props" data-slide="0">
        <button data-mode="cover">Cover</button>
        <button data-mode="contain">Contain</button>
        <button data-mode="fill">Fill</button>
        <button data-mode="original">Original</button>
      </div>
      <div class="fallback-msg"><div class="fallback-box"><div class="fb-num">Slide Number 1</div><div class="fb-label">Import image or paste from clipboard</div></div></div>
      <span class="slide-label">Slide 1</span>
      <span class="slide-number">1 / 1</span>
    </div>

    <button class="nav-arrow prev" id="prevBtn" aria-label="Previous slide">&#8249;</button>
    <button class="nav-arrow next" id="nextBtn" aria-label="Next slide">&#8250;</button>

    <div class="dots" id="dots"></div>
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
</div>

<button class="settings-btn" id="settingsBtn" aria-label="Settings">&#9881;</button>
<button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">&#9974;</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Slide Images</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg">Are you sure you want to delete this slide?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script>
  (function () {
    const container = document.getElementById('slideshow');
    const slides = Array.from(container.querySelectorAll('.slide'));
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsContainer = document.getElementById('dots');
    const progressBar = document.getElementById('progressBar');
    const settingsBtn = document.getElementById('settingsBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');
    const modalCancel = document.getElementById('modalCancel');
    const modalSave = document.getElementById('modalSave');
    const thumbnails = document.getElementById('thumbnails');
    const slideCount = document.getElementById('slideCount');
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmMsg = document.getElementById('confirmMsg');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmDelete = document.getElementById('confirmDelete');

    let current = 0;
    let slideUrls = {};
    let savedCount = 0;
    let settingsDirty = false;
    let dragSrcIndex = null;
    let dropPlaceholder = null;

    let resizeData = {};
    let slideMode = {};
    let activeResize = null;
    let undoData = null;

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem('slideData');
        if (saved) {
          const data = JSON.parse(saved);
          slideUrls = data.urls || {};
          savedCount = data.count || 1;
          resizeData = data.resize || {};
          slideMode = data.mode || {};
        }
      } catch (_) {}
    }

    function saveToStorage() {
      try {
        localStorage.setItem('slideData', JSON.stringify({
          count: slides.length,
          urls: slideUrls,
          resize: resizeData,
          mode: slideMode
        }));
      } catch (_) {}
    }

    function applyMode(img, idx) {
      if (!img) return;
      const mode = slideMode[idx] || 'contain';
      if (mode === 'cover') { img.style.objectFit = 'cover'; }
      else if (mode === 'contain') { img.style.objectFit = 'contain'; }
      else if (mode === 'fill') { img.style.objectFit = 'fill'; }
      else if (mode === 'original') { img.style.objectFit = 'none'; }
    }

    function applySlideImage(el, url) {
      const wrap = el.querySelector('.slide-img-wrap');
      const img = wrap?.querySelector('img');
      const fallback = el.querySelector('.fallback-msg');
      if (url && url.trim()) {
        el.classList.add('has-image');
        if (img && wrap) {
          img.src = url.trim();
          applyMode(img, el.dataset.slide);
          wrap.style.display = 'block';
          const rd = resizeData[el.dataset.slide];
          if (rd) {
            wrap.style.left = rd.x;
            wrap.style.top = rd.y;
            wrap.style.width = rd.w;
            wrap.style.height = rd.h;
          } else {
            wrap.style.left = '10%';
            wrap.style.top = '10%';
            wrap.style.width = '80%';
            wrap.style.height = '80%';
          }
        }
        if (fallback) fallback.style.display = 'none';
      } else {
        el.classList.remove('has-image');
        el.style.backgroundImage = 'none';
        if (wrap) wrap.style.display = 'none';
        if (fallback) fallback.style.display = '';
      }
    }

    function applyAllImages() {
      slides.forEach((el, i) => {
        applySlideImage(el, slideUrls[i] || '');
      });
    }

    function setupSlideDrop(el) {
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        el.classList.add('drag-over');
      });

      el.addEventListener('dragleave', () => {
        el.classList.remove('drag-over');
      });

      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const idx = parseInt(el.dataset.slide);
            const dataUrl = ev.target.result;
            slideUrls[idx] = dataUrl;
            delete resizeData[idx];
            applySlideImage(el, dataUrl);
            saveToStorage();
            rebuildThumbnails();
            update();
          };
          reader.readAsDataURL(file);
        }
      });
    }

    function setupResize(el) {
      const wrap = el.querySelector('.slide-img-wrap');
      if (!wrap) return;
      const handles = wrap.querySelectorAll('.resize-handle');
      const props = el.querySelector('.img-props');

      if (props) {
        const btns = props.querySelectorAll('button');
        btns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = parseInt(el.dataset.slide);
            const mode = btn.dataset.mode;
            slideMode[idx] = mode;
            const img = wrap.querySelector('img');
            applyMode(img, idx);
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            saveToStorage();
          });
        });
      }

      el.addEventListener('click', (e) => {
        const clickedWrap = e.target.closest('.slide-img-wrap');
        slides.forEach(s => {
          const w = s.querySelector('.slide-img-wrap');
          if (w) w.classList.remove('selected');
        });
        if (clickedWrap && !document.documentElement.classList.contains('fullscreen')) {
          clickedWrap.classList.add('selected');
          const propsPanel = el.querySelector('.img-props');
          if (propsPanel) {
            const mode = slideMode[el.dataset.slide] || 'contain';
            propsPanel.querySelectorAll('button').forEach(b => {
              b.classList.toggle('active', b.dataset.mode === mode);
            });
          }
        }
      });

      handles.forEach(handle => {
        handle.addEventListener('mousedown', (e) => {
          if (document.documentElement.classList.contains('fullscreen')) return;
          e.preventDefault();
          e.stopPropagation();
          const idx = parseInt(el.dataset.slide);
          const rect = wrap.getBoundingClientRect();
          const containerRect = el.getBoundingClientRect();
          activeResize = {
            idx,
            handle: handle.className.replace('resize-handle ', ''),
            startX: e.clientX,
            startY: e.clientY,
            startW: rect.width,
            startH: rect.height,
            startL: rect.left - containerRect.left,
            startT: rect.top - containerRect.top,
            containerRect
          };
        });
      });

      wrap.addEventListener('mousedown', (e) => {
        if (document.documentElement.classList.contains('fullscreen')) return;
        if (e.target.classList.contains('resize-handle')) return;
        e.preventDefault();
        const idx = parseInt(el.dataset.slide);
        const rect = wrap.getBoundingClientRect();
        const containerRect = el.getBoundingClientRect();
        activeResize = {
          idx,
          handle: 'move',
          startX: e.clientX,
          startY: e.clientY,
          startL: rect.left - containerRect.left,
          startT: rect.top - containerRect.top,
          startW: rect.width,
          startH: rect.height,
          containerRect
        };
      });
    }

    document.addEventListener('mousemove', (e) => {
      if (!activeResize) return;
      const dx = e.clientX - activeResize.startX;
      const dy = e.clientY - activeResize.startY;
      const h = activeResize.handle;
      const slideEl = slides[activeResize.idx];
      const wrap = slideEl?.querySelector('.slide-img-wrap');
      if (!wrap) return;

      let x = activeResize.startL;
      let y = activeResize.startT;
      let w = activeResize.startW;
      let hh = activeResize.startH;
      const min = 30;

      const sides = {
        'e':  () => { w = Math.max(min, activeResize.startW + dx); },
        'w':  () => { const dw = Math.min(activeResize.startW - min, dx); x = activeResize.startL + dw; w = activeResize.startW - dw; },
        's':  () => { hh = Math.max(min, activeResize.startH + dy); },
        'n':  () => { const dh = Math.min(activeResize.startH - min, dy); y = activeResize.startT + dh; hh = activeResize.startH - dh; },
        'ne': () => { w = Math.max(min, activeResize.startW + dx); const dh = Math.min(activeResize.startH - min, dy); y = activeResize.startT + dh; hh = activeResize.startH - dh; },
        'nw': () => { const dw = Math.min(activeResize.startW - min, dx); x = activeResize.startL + dw; w = activeResize.startW - dw; const dh = Math.min(activeResize.startH - min, dy); y = activeResize.startT + dh; hh = activeResize.startH - dh; },
        'se': () => { w = Math.max(min, activeResize.startW + dx); hh = Math.max(min, activeResize.startH + dy); },
        'sw': () => { const dw = Math.min(activeResize.startW - min, dx); x = activeResize.startL + dw; w = activeResize.startW - dw; hh = Math.max(min, activeResize.startH + dy); },
        'move': () => { x = activeResize.startL + dx; y = activeResize.startT + dy; }
      };

      if (sides[h]) sides[h]();

      wrap.style.left = x + 'px';
      wrap.style.top = y + 'px';
      wrap.style.width = w + 'px';
      wrap.style.height = hh + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!activeResize) return;
      const slideEl = slides[activeResize.idx];
      const wrap = slideEl?.querySelector('.slide-img-wrap');
      if (wrap) {
        const sw = slideEl.offsetWidth;
        const sh = slideEl.offsetHeight;
        const wr = wrap.getBoundingClientRect();
        const sr = slideEl.getBoundingClientRect();
        const x = ((wr.left - sr.left) / sw * 100) + '%';
        const y = ((wr.top - sr.top) / sh * 100) + '%';
        const w = (wr.width / sw * 100) + '%';
        const h = (wr.height / sh * 100) + '%';
        resizeData[activeResize.idx] = { x, y, w, h };
        wrap.style.left = x;
        wrap.style.top = y;
        wrap.style.width = w;
        wrap.style.height = h;
        saveToStorage();
      }
      activeResize = null;
    });

    function createDropPlaceholder() {
      const el = document.createElement('div');
      el.className = 'drop-placeholder';
      return el;
    }

    let confirmCb = null;

    function showConfirm(msg, cb) {
      confirmMsg.textContent = msg;
      confirmCb = cb;
      confirmOverlay.classList.add('open');
    }

    function hideConfirm() {
      confirmOverlay.classList.remove('open');
      confirmCb = null;
    }

    confirmCancel.addEventListener('click', hideConfirm);
    confirmDelete.addEventListener('click', () => {
      const cb = confirmCb;
      hideConfirm();
      if (cb) cb();
    });
    confirmOverlay.addEventListener('click', (e) => {
      if (e.target === confirmOverlay) hideConfirm();
    });

    function clearDropPlaceholder() {
      if (dropPlaceholder && dropPlaceholder.parentNode) {
        dropPlaceholder.parentNode.removeChild(dropPlaceholder);
      }
      dropPlaceholder = null;
    }

    function reorderSlides(fromIdx, toIdx) {
      if (fromIdx === toIdx) return;

      const urlsInOrder = slides.map((_, i) => slideUrls[i] || '');
      const resizeInOrder = slides.map((_, i) => resizeData[i] || null);
      const modeInOrder = slides.map((_, i) => slideMode[i] || 'contain');

      const [moved] = slides.splice(fromIdx, 1);
      slides.splice(toIdx, 0, moved);

      const [movedUrl] = urlsInOrder.splice(fromIdx, 1);
      urlsInOrder.splice(toIdx, 0, movedUrl);

      const [movedResize] = resizeInOrder.splice(fromIdx, 1);
      resizeInOrder.splice(toIdx, 0, movedResize);

      const [movedMode] = modeInOrder.splice(fromIdx, 1);
      modeInOrder.splice(toIdx, 0, movedMode);

      slideUrls = {};
      resizeData = {};
      slideMode = {};
      urlsInOrder.forEach((url, i) => {
        if (url) slideUrls[i] = url;
      });
      resizeInOrder.forEach((rd, i) => {
        if (rd) resizeData[i] = rd;
      });
      modeInOrder.forEach((m, i) => {
        if (m) slideMode[i] = m;
      });

      slides.forEach(el => container.appendChild(el));

      slides.forEach((el, i) => {
        el.dataset.slide = i;
        el.querySelector('.slide-label').textContent = 'Slide ' + (i + 1);
        applySlideImage(el, slideUrls[i] || '');
      });

      if (current === fromIdx) current = toIdx;
      else if (fromIdx < toIdx && current > fromIdx && current <= toIdx) current--;
      else if (fromIdx > toIdx && current < fromIdx && current >= toIdx) current++;

      saveToStorage();
      rebuildThumbnails();
      update();
    }

    function rebuildThumbnails() {
      thumbnails.innerHTML = '';
      slides.forEach((el, i) => {
        const item = document.createElement('div');
        item.className = 'thumb-item' + (i === current ? ' active' : '');
        item.dataset.index = i;
        item.draggable = true;

        const preview = document.createElement('div');
        preview.className = 'thumb-preview';
        const url = slideUrls[i];
        if (url && url.trim()) {
          preview.style.backgroundImage = 'url("' + url.replace(/"/g, '\\"') + '")';
        } else {
          preview.innerHTML = '<span class="thumb-placeholder">&#x1F5BC;</span>';
        }

        const info = document.createElement('div');
        info.className = 'thumb-info';

        const label = document.createElement('span');
        label.className = 'thumb-label';
        label.textContent = 'Slide ' + (i + 1);

        const desc = document.createElement('span');
        desc.className = 'thumb-desc';
        desc.textContent = url && url.trim() ? url.split('/').pop() || 'Image' : 'No image';

        info.appendChild(label);
        info.appendChild(desc);
        item.appendChild(preview);
        item.appendChild(info);

        if (slides.length > 1) {
          const delBtn = document.createElement('button');
          delBtn.className = 'thumb-del-btn';
          delBtn.textContent = 'x';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showConfirm('Delete Slide ' + (i + 1) + '?', () => removeSlide(i));
          });
          item.appendChild(delBtn);
        }

        item.addEventListener('click', () => goTo(i));

        item.addEventListener('dragstart', (e) => {
          dragSrcIndex = i;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', i);
        });

        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          clearDropPlaceholder();
          dragSrcIndex = null;
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (dragSrcIndex === null || dragSrcIndex === i) return;

          const rect = item.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          const insertBefore = e.clientY < midY;

          if (dropPlaceholder && dropPlaceholder.parentNode) {
            const currentPos = Array.from(thumbnails.children).indexOf(dropPlaceholder);
            const targetPos = Array.from(thumbnails.children).indexOf(item);
            const expectedPos = insertBefore ? targetPos : targetPos + 1;
            if (currentPos === expectedPos) return;
            dropPlaceholder.remove();
          }

          dropPlaceholder = createDropPlaceholder();
          if (insertBefore) {
            thumbnails.insertBefore(dropPlaceholder, item);
          } else {
            thumbnails.insertBefore(dropPlaceholder, item.nextSibling);
          }
        });

        item.addEventListener('dragleave', (e) => {
          if (dropPlaceholder && !e.relatedTarget?.closest?.('.thumb-item, .drop-placeholder')) {
            clearDropPlaceholder();
          }
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          clearDropPlaceholder();
          if (dragSrcIndex !== null && dragSrcIndex !== i) {
            reorderSlides(dragSrcIndex, i);
          }
        });

        thumbnails.appendChild(item);
      });

      thumbnails.addEventListener('dragover', (e) => {
        if (dragSrcIndex === null) return;
        e.preventDefault();
        const children = Array.from(thumbnails.children);
        const lastItem = children.filter(c => c.classList.contains('thumb-item')).pop();
        if (!lastItem) return;
        const rect = lastItem.getBoundingClientRect();
        if (e.clientY > rect.bottom && !dropPlaceholder?.parentNode) {
          dropPlaceholder = createDropPlaceholder();
          thumbnails.appendChild(dropPlaceholder);
        }
      });

      thumbnails.addEventListener('dragleave', (e) => {
        if (dropPlaceholder && !thumbnails.contains(e.relatedTarget)) {
          clearDropPlaceholder();
        }
      });

      thumbnails.addEventListener('drop', (e) => {
        if (dragSrcIndex === null) return;
        e.preventDefault();
        const target = e.target.closest('.thumb-item');
        if (target) return;
        if (dropPlaceholder?.parentNode) {
          const toIdx = slides.length - 1;
          if (dragSrcIndex !== toIdx) reorderSlides(dragSrcIndex, toIdx);
          clearDropPlaceholder();
        }
      });

      slideCount.textContent = slides.length;
    }

    function rebuildSlides() {
      while (dotsContainer.firstChild) dotsContainer.removeChild(dotsContainer.firstChild);
      createDots();
      current = Math.min(current, slides.length - 1);
      update();
      applyAllImages();
      rebuildThumbnails();
    }

    function addSlide() {
      const idx = slides.length;
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.slide = idx;
      slide.innerHTML =
        '<div class="slide-img-wrap">' +
          '<img alt="" draggable="false">' +
          '<div class="resize-handle nw"></div>' +
          '<div class="resize-handle n"></div>' +
          '<div class="resize-handle ne"></div>' +
          '<div class="resize-handle e"></div>' +
          '<div class="resize-handle se"></div>' +
          '<div class="resize-handle s"></div>' +
          '<div class="resize-handle sw"></div>' +
          '<div class="resize-handle w"></div>' +
        '</div>' +
        '<div class="img-props" data-slide="' + idx + '">' +
          '<button data-mode="cover">Cover</button>' +
          '<button data-mode="contain">Contain</button>' +
          '<button data-mode="fill">Fill</button>' +
          '<button data-mode="original">Original</button>' +
        '</div>' +
        '<div class="fallback-msg"><div class="fallback-box"><div class="fb-num">Slide Number ' + (idx + 1) + '</div><div class="fb-label">Import image or paste from clipboard</div></div></div>' +
        '<span class="slide-label">Slide ' + (idx + 1) + '</span>' +
        '<span class="slide-number">' + (idx + 1) + ' / ' + (idx + 1) + '</span>';
      container.appendChild(slide);
      slides.push(slide);
      setupSlideDrop(slide);
      setupResize(slide);
      applySlideImage(slide, slideUrls[idx] || '');
      rebuildSlides();
      goTo(idx);
      saveToStorage();
      settingsDirty = true;
    }

    function removeSlide(index) {
      if (slides.length <= 1) return;
      const el = slides[index];
      el.remove();
      slides.splice(index, 1);
      delete slideUrls[index];
      delete resizeData[index];
      delete slideMode[index];
      const reindexed = {};
      slides.forEach((_, i) => {
        if (slideUrls[i] !== undefined) reindexed[i] = slideUrls[i];
        else if (slideUrls[i + 1] !== undefined) reindexed[i] = slideUrls[i + 1];
      });
      slideUrls = reindexed;
      const resizeReindexed = {};
      slides.forEach((_, i) => {
        if (resizeData[i] !== undefined) resizeReindexed[i] = resizeData[i];
        else if (resizeData[i + 1] !== undefined) resizeReindexed[i] = resizeData[i + 1];
      });
      resizeData = resizeReindexed;
      const modeReindexed = {};
      slides.forEach((_, i) => {
        if (slideMode[i] !== undefined) modeReindexed[i] = slideMode[i];
        else if (slideMode[i + 1] !== undefined) modeReindexed[i] = slideMode[i + 1];
      });
      slideMode = modeReindexed;
      slides.forEach((el, i) => {
        el.dataset.slide = i;
        el.querySelector('.slide-label').textContent = 'Slide ' + (i + 1);
      });
      rebuildSlides();
      saveToStorage();
      settingsDirty = true;
    }

    function createDots() {
      slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });
    }

    function update() {
      slides.forEach((el, i) => {
        el.classList.remove('active', 'exit-prev', 'exit-next');
        if (i === current) el.classList.add('active');
      });

      const dots = dotsContainer.querySelectorAll('.dot');
      dots.forEach((d, i) => d.classList.toggle('active', i === current));

      const total = slides.length;
      progressBar.style.width = ((current + 1) / total * 100) + '%';

      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;

      slides.forEach((el, i) => {
        el.querySelector('.slide-number').textContent = (i + 1) + ' / ' + total;
        const fbNum = el.querySelector('.fb-num');
        if (fbNum) fbNum.textContent = 'Slide Number ' + (i + 1);
      });

      const items = thumbnails.querySelectorAll('.thumb-item');
      items.forEach((item, i) => item.classList.toggle('active', i === current));
    }

    function goTo(index) {
      if (index < 0 || index >= slides.length || index === current) return;
      slides.forEach(el => el.classList.remove('exit-prev', 'exit-next'));
      current = index;
      update();
      const activeThumb = thumbnails.querySelector('.thumb-item.active');
      if (activeThumb) activeThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function prev() {
      if (current === 0) return;
      slides[current].classList.add('exit-prev');
      current--;
      update();
    }

    function next() {
      if (current === slides.length - 1) return;
      slides[current].classList.add('exit-next');
      current++;
      update();
    }

    function openSettings() {
      settingsDirty = false;
      modalBody.innerHTML = '';
      slides.forEach((el, i) => {
        const div = document.createElement('div');
        div.className = 'slide-setting';

        const header = document.createElement('div');
        header.className = 'slide-setting-header';

        const label = document.createElement('label');
        label.textContent = 'Slide ' + (i + 1);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-slide-btn';
        removeBtn.textContent = 'Remove';
        removeBtn.addEventListener('click', () => {
          removeSlide(i);
          openSettings();
        });
        if (slides.length <= 1) removeBtn.style.display = 'none';

        header.appendChild(label);
        header.appendChild(removeBtn);

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'https://example.com/image.jpg';
        input.value = slideUrls[i] || '';
        input.dataset.index = i;

        const preview = document.createElement('div');
        preview.className = 'preview-thumb';
        if (slideUrls[i] && slideUrls[i].trim()) {
          preview.style.backgroundImage = 'url("' + slideUrls[i].replace(/"/g, '\\"') + '")';
          preview.classList.add('show');
        }

        input.addEventListener('input', () => {
          const val = input.value.trim();
          if (val) {
            preview.style.backgroundImage = 'url("' + val.replace(/"/g, '\\"') + '")';
            preview.classList.add('show');
          } else {
            preview.classList.remove('show');
          }
          settingsDirty = true;
        });

        div.appendChild(header);
        div.appendChild(input);
        div.appendChild(preview);
        modalBody.appendChild(div);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-slide-btn';
      addBtn.innerHTML = '+ Add Slide';
      addBtn.addEventListener('click', () => {
        addSlide();
        openSettings();
      });
      modalBody.appendChild(addBtn);

      modalOverlay.classList.add('open');
    }

    function closeSettings() {
      modalOverlay.classList.remove('open');
    }

    function saveSettings() {
      const inputs = modalBody.querySelectorAll('input');
      inputs.forEach(input => {
        const idx = parseInt(input.dataset.index);
        const val = input.value.trim();
        if (val) {
          slideUrls[idx] = val;
        } else {
          delete slideUrls[idx];
        }
      });
      saveToStorage();
      applyAllImages();
      rebuildThumbnails();
      settingsDirty = false;
      closeSettings();
    }

    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    document.getElementById('sidebarClose').addEventListener('click', () => {
      sidebar.classList.add('collapsed');
    });

    document.getElementById('sidebarAddBtn').addEventListener('click', addSlide);

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const isFull = !!document.fullscreenElement;
      document.documentElement.classList.toggle('fullscreen', isFull);
      fullscreenBtn.innerHTML = isFull ? '&#9212;' : '&#9974;';
      fullscreenBtn.title = isFull ? 'Exit fullscreen' : 'Fullscreen';
      sidebar.classList.toggle('collapsed', isFull);
      document.getElementById('settingsBtn').style.display = isFull ? 'none' : '';
      sidebarToggle.style.display = isFull ? 'none' : '';
      container.style.width = isFull ? '100%' : '';
      container.style.maxWidth = isFull ? 'none' : '';
      container.style.height = isFull ? '100vh' : '';
      container.style.borderRadius = isFull ? '0' : '';
    });

    settingsBtn.addEventListener('click', openSettings);
    modalClose.addEventListener('click', closeSettings);
    modalCancel.addEventListener('click', closeSettings);
    modalSave.addEventListener('click', saveSettings);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeSettings();
    });

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    function getSelectedImgIdx() {
      const sel = document.querySelector('.slide-img-wrap.selected');
      if (!sel) return -1;
      const slide = sel.closest('.slide');
      return slide ? parseInt(slide.dataset.slide) : -1;
    }

    function deleteSelectedImage() {
      const idx = getSelectedImgIdx();
      if (idx < 0) return;
      const wrap = slides[idx]?.querySelector('.slide-img-wrap');
      if (wrap) {
        wrap.classList.remove('selected');
      }
      undoData = { idx, url: slideUrls[idx] || null, resize: resizeData[idx] || null, mode: slideMode[idx] || null };
      delete slideUrls[idx];
      delete resizeData[idx];
      delete slideMode[idx];
      applySlideImage(slides[idx], '');
      saveToStorage();
      rebuildThumbnails();
    }

    function undoDelete() {
      if (!undoData) return;
      let idx = undoData.idx;
      if (idx >= slides.length) idx = slides.length - 1;
      if (undoData.url) slideUrls[idx] = undoData.url;
      if (undoData.resize) resizeData[idx] = undoData.resize;
      if (undoData.mode) slideMode[idx] = undoData.mode;
      applySlideImage(slides[idx], undoData.url || '');
      undoData = null;
      saveToStorage();
      rebuildThumbnails();
    }

    document.addEventListener('keydown', (e) => {
      if (modalOverlay.classList.contains('open')) {
        if (e.key === 'Escape') { e.preventDefault(); closeSettings(); }
        if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); saveSettings(); }
        return;
      }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault(); next();
      }
      if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (getSelectedImgIdx() >= 0) { e.preventDefault(); deleteSelectedImage(); }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault(); undoDelete();
      }
      if (e.key === 'Escape') { e.preventDefault(); settingsBtn.click(); }
    });

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      let imgItem = null;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) { imgItem = items[i]; break; }
      }
      if (!imgItem) return;
      e.preventDefault();
      const selIdx = getSelectedImgIdx();
      const idx = selIdx >= 0 ? selIdx : current;
      if (idx < 0 || idx >= slides.length) return;
      const file = imgItem.getAsFile();
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        slideUrls[idx] = ev.target.result;
        delete resizeData[idx];
        delete slideMode[idx];
        const wrap = slides[idx].querySelector('.slide-img-wrap');
        if (wrap) wrap.classList.remove('selected');
        applySlideImage(slides[idx], ev.target.result);
        saveToStorage();
        rebuildThumbnails();
        update();
      };
      reader.readAsDataURL(file);
    });

    container.addEventListener('click', (e) => {
      if (e.target.closest('.nav-arrow') || e.target.closest('.dot') || e.target.closest('.settings-btn')) return;
    });

    loadFromStorage();

    for (let i = 1; i < savedCount; i++) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.slide = i;
      slide.innerHTML =
        '<div class="slide-img-wrap">' +
          '<img alt="" draggable="false">' +
          '<div class="resize-handle nw"></div>' +
          '<div class="resize-handle n"></div>' +
          '<div class="resize-handle ne"></div>' +
          '<div class="resize-handle e"></div>' +
          '<div class="resize-handle se"></div>' +
          '<div class="resize-handle s"></div>' +
          '<div class="resize-handle sw"></div>' +
          '<div class="resize-handle w"></div>' +
        '</div>' +
        '<div class="img-props" data-slide="' + i + '">' +
          '<button data-mode="cover">Cover</button>' +
          '<button data-mode="contain">Contain</button>' +
          '<button data-mode="fill">Fill</button>' +
          '<button data-mode="original">Original</button>' +
        '</div>' +
        '<div class="fallback-msg"><div class="fallback-box"><div class="fb-num">Slide Number ' + (i + 1) + '</div><div class="fb-label">Import image or paste from clipboard</div></div></div>' +
        '<span class="slide-label">Slide ' + (i + 1) + '</span>' +
        '<span class="slide-number">' + (i + 1) + ' / ' + savedCount + '</span>';
      container.appendChild(slide);
      slides.push(slide);
    }

    slides.forEach(el => { setupSlideDrop(el); setupResize(el); });

    createDots();
    applyAllImages();
    rebuildThumbnails();
    update();

    if (window.innerWidth <= 900) {
      sidebar.classList.add('collapsed');
    }
  })();
</script>
</body>
</html>
