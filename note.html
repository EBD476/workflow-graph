    function highlightCode(code, lang) {
      const rules = CODE_HIGHLIGHT_RULES[lang];
      if (!rules) return code;
      return applyHighlightRules(code, rules);
    }

    function renderCodeBlock(lang, code) {
      const normalized = normalizeCodeLang(lang);
      const trimmed = code.replace(/\n$/, '');
      const highlighted = highlightCode(trimmed, normalized);
      const label = normalized !== 'plain'
        ? `<span class="code-lang-label">${normalized}</span>`
        : '';
      return `<pre class="code-block lang-${normalized}" data-lang="${normalized}">${label}<code>${highlighted}</code></pre>`;
    }

    function renderMarkdown(text) {
      if (!text) return '';
      const codeBlocks = [];
      let html = text
        .replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m] || m)
        .replace(/```([\w-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
          const token = `\x00CODE${codeBlocks.length}\x00`;
          codeBlocks.push(renderCodeBlock(lang, code));
          return token;
        })
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^\* (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
        .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/~~([^~]+)~~/g, '<del>$1</del>');

      const lines = html.split('\n');
      let result = '';
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.startsWith('<li>')) {
          if (!inList) { inList = true; result += '<ul>'; }
          result += line;
        } else {
          if (inList) { inList = false; result += '</ul>'; }
          if (line.startsWith('<blockquote>')) {
            result += line + '</blockquote>';
          } else if (/^\x00CODE\d+\x00$/.test(line.trim())) {
            result += line.trim();
          } else if (line.startsWith('<h') || line.startsWith('<hr')) {
            result += line;
          } else if (line.trim()) {
            result += '<p>' + line + '</p>';
          }
        }
      }
      if (inList) result += '</ul>';

      codeBlocks.forEach((block, i) => {
        result = result.replace(`\x00CODE${i}\x00`, block);
      });

      return result || '<span style="opacity:0.35">Empty</span>';
    }

    let dragState = null;
    let dragPending = null;
    const DRAG_THRESHOLD = 5;
    let focusModeNoteId = null;
    let currentFindQuery = null;

    function highlightText(html, query) {
      if (!query) return html;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escaped})`, 'gi');
      return html.replace(regex, '<mark class="find-highlight">$1</mark>');
    }

    function findInNotes(query) {
      const trimmed = query.trim();
      if (!trimmed) return;
      clearFindHighlights();
      currentFindQuery = trimmed;
      renderStickyNotes();
      let noteCount = 0, wordCount = 0;
      const lower = trimmed.toLowerCase();
      notes.forEach(n => {
        if (n.text && n.text.toLowerCase().includes(lower)) {
          noteCount++;
          const re = new RegExp(trimmed.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
          wordCount += (n.text.match(re) || []).length;
        }
      });
      showToast(`🔍︎ Found ${wordCount} match${wordCount !== 1 ? 'es' : ''} in ${noteCount} note${noteCount !== 1 ? 's' : ''} for "${trimmed}"`);
      requestAnimationFrame(() => {
        document.querySelectorAll('.draggable-note-text').forEach(textEl => {
          const mark = textEl.querySelector('.find-highlight');
          if (mark) {
            const textRect = textEl.getBoundingClientRect();
            const markRect = mark.getBoundingClientRect();
            const offset = markRect.top - textRect.top - textEl.clientHeight / 2 + markRect.height / 2;
            textEl.scrollTop += offset;
          }
        });
      });
    }

    function clearFindHighlights() {
      if (!currentFindQuery) return;
      currentFindQuery = null;
      renderStickyNotes();
    }

    function showToast(message, duration) {
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast';
      const iconMatch = message.match(/^(\uD83D[\uDD00-\uDEFF]|[\u2000-\u27BF\u2B00-\u2BFF])\s*/);
      let iconHtml = '';
      let textMsg = message;
      if (iconMatch) {
        iconHtml = `<span class="toast-icon">${iconMatch[1]}</span>`;
        textMsg = message.slice(iconMatch[0].length);
      }
      el.innerHTML = `
        ${iconHtml}
        <span class="toast-message">${textMsg}</span>
        <button class="toast-dismiss">✕</button>
      `;
      el.querySelector('.toast-dismiss').addEventListener('click', () => {
        el.classList.add('removing');
        setTimeout(() => el.remove(), 250);
      });
      container.appendChild(el);
      setTimeout(() => {
        if (el.isConnected) {
          el.classList.add('removing');
          setTimeout(() => el.remove(), 250);
        }
      }, duration || 4000);
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportNotes(type) {
      const canvas = getCurrentCanvas();
      if (!canvas || !canvas.notes || canvas.notes.length === 0) {
        showToast('\u26A0\uFE0F No notes to export');
        return;
      }
      const canvasName = canvas.name.replace(/[^a-zA-Z0-9 _-]/g, '').trim() || 'notes';
      const notes = canvas.notes;
      const date = new Date().toISOString().slice(0, 10);

      if (type === 'export-md') {
        let md = `# ${canvas.name}\n\n`;
        notes.forEach((n, i) => {
          md += `## Note ${i + 1} \u2014 ${new Date(n.created).toLocaleString()}\n\n`;
          md += n.text || '*Empty*';
          md += '\n\n---\n\n';
        });
        downloadFile(md, `${date}_${canvasName}.md`, 'text/markdown;charset=utf-8');
        showToast(`\uD83D\uDCDD Exported ${notes.length} note${notes.length > 1 ? 's' : ''} as Markdown`);

      } else if (type === 'export-json') {
        const data = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), canvases, currentCanvasId }, null, 2);
        downloadFile(data, `${date}_${canvasName}_backup.json`, 'application/json;charset=utf-8');
        showToast(`\u2699\uFE0F JSON backup exported`);

      } else if (type === 'export-html') {
        const timeStr = new Date().toLocaleString();
        const noteHTML = notes.map(n => {
          const bgHex = NOTE_HEX_MAP[n.color] || '#fff3b0';
          const content = renderNoteContent(n);
          return `<div class="snapshot-note" style="left:${n.x}px;top:${n.y}px;width:${n.w || 220}px;height:${n.h || 180}px;background:${bgHex};z-index:${n.z || 60}">
            <div class="snapshot-note-time">${new Date(n.created).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
            <div class="snapshot-note-text">${content}</div>
          </div>`;
        }).join('\n      ');
        const canvasBg = canvas.bg || '#171f49';
        const html = `<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(canvas.name)} \u2014 Snapshot</title>

      font-size: 9px;

    }

    .snapshot-note-text p { margin: 4px 0; }

    .snapshot-note-text h1, .snapshot-note-text h2, .snapshot-note-text h3 { font-weight: 600; line-height: 1.3; margin: 6px 0 4px; }
    .snapshot-note-text h1 { font-size: 17px; }

      border-left: 3px solid rgba(0,0,0,0.15);

  </style>
  </head>
  <body>
    <div class="snapshot-header">${escapeHtml(canvas.name)} \u2014 ${notes.length} note${notes.length > 1 ? 's' : ''} \u2014 ${timeStr}</div>
    ${noteHTML}
  </body>
  </html>`;
        downloadFile(html, `${date}_${canvasName}.html`, 'text/html;charset=utf-8');
        showToast(`\uD83C\uDF10 HTML snapshot exported (${notes.length} note${notes.length > 1 ? 's' : ''})`);

    function showContextMenu(e) {
      e.preventDefault();
      closeContextMenu();
      const menu = document.getElementById('contextMenu');
      const canvas = getCurrentCanvas();
      const cx = e.clientX, cy = e.clientY;
      const activeCount = notes.filter(n => !n.archived).length;
      menu.innerHTML = `
        <div class="context-menu-item" data-action="simple" data-x="${cx}" data-y="${cy}"> New Simple Note</div>
        <div class="context-menu-item" data-action="markdown" data-x="${cx}" data-y="${cy}"> New Markdown Note</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="auto-layout">Auto-Layout${activeCount ? ` (${activeCount} notes)` : ''}</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="bg"> Change Background</div>
      `;
      const rect = menu.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 8;
      const maxY = window.innerHeight - rect.height - 8;
      menu.style.left = Math.min(cx, maxX) + 'px';
      menu.style.top = Math.min(cy, maxY) + 'px';
      menu.classList.add('visible');
    }

    function closeContextMenu() {
      document.getElementById('contextMenu').classList.remove('visible');
    }

    let tagPopupNoteId = null;

    function openTagPopup(noteId, anchorEl) {
      closeTagPopup();
      tagPopupNoteId = noteId;
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      const popup = document.getElementById('tagPopup');
      const tagsEl = document.getElementById('tagPopupTags');
      const input = document.getElementById('tagPopupInput');
      tagsEl.innerHTML = (note.tags || []).map(t =>
        `<span class="note-tag">${escapeHtml(t)}<button class="note-tag-remove" data-tag-rm="${noteId}" data-tag-name="${t}">✕</button></span>`
      ).join('');
      input.value = '';
      const rect = anchorEl.getBoundingClientRect();
      let top = rect.top - popup.offsetHeight - 8;
      let left = rect.left;
      if (top < 8) top = rect.bottom + 8;
      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
      popup.classList.add('visible');
      requestAnimationFrame(() => input.focus());
    }

    function closeTagPopup() {
      document.getElementById('tagPopup').classList.remove('visible');
      tagPopupNoteId = null;
    }

    function addTagToNote(noteId, tagName) {
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      const tag = tagName.trim().toLowerCase().replace(/[^a-zA-Z0-9 _-]/g, '');
      if (!tag || (note.tags || []).includes(tag)) return;
      if (!note.tags) note.tags = [];
      note.tags.push(tag);
      saveCanvasData();
      renderStickyNotes();
      renderSidebar();
      if (tagPopupNoteId === noteId) {
        openTagPopup(noteId, document.querySelector(`.note-tag-btn[data-tag-id="${noteId}"]`));
      }
    }

    function removeTagFromNote(noteId, tagName) {
      const note = notes.find(n => n.id === noteId);
      if (!note || !note.tags) return;
      note.tags = note.tags.filter(t => t !== tagName);
      saveCanvasData();
      renderStickyNotes();
      renderSidebar();
      if (tagPopupNoteId === noteId) {
        const anchor = document.querySelector(`.note-tag-btn[data-tag-id="${noteId}"]`);
        if (anchor) openTagPopup(noteId, anchor);
      }
    }

    function enterFocusMode(noteId) {
      exitFocusMode();
      focusModeNoteId = noteId;
      document.querySelectorAll('.draggable-note').forEach(el => {
        if (el.dataset.id === noteId) {
          el.classList.add('focused');
        } else {
          el.classList.add('dimmed');
        }
      });
      const btn = document.querySelector(`.note-focus-btn[data-focus-id="${noteId}"]`);
      if (btn) btn.classList.add('active');
    }

    function exitFocusMode() {
      if (!focusModeNoteId) return;
      document.querySelectorAll('.draggable-note').forEach(el => {
        el.classList.remove('dimmed', 'focused');
      });
      const btn = document.querySelector(`.note-focus-btn[data-focus-id="${focusModeNoteId}"]`);
      if (btn) btn.classList.remove('active');
      focusModeNoteId = null;
    }

    function bringNoteToFront(noteEl) {
      if (!noteEl) return;
      const id = noteEl.dataset.id;
      const note = notes.find(n => n.id === id);
      if (!note) return;
      const newZ = getNextNoteZ();
      if (note.z === newZ) return;
      note.z = newZ;
      noteEl.style.zIndex = String(newZ);
    }

    function ensureNoteFormat(note) {
      if (!note.format) {
        note.format = 'plain';
      }
    }

    function startNoteDrag(el, clientX, clientY) {
      bringNoteToFront(el);
      const rect = el.getBoundingClientRect();
      dragState = { type: 'move', el, startX: clientX, startY: clientY, origX: rect.left, origY: rect.top };
      el.classList.add('dragging');
    }

    function clearDragPending() {
      dragPending = null;
    }

    function renderStickyNotes() {
      document.querySelectorAll('.draggable-note').forEach(el => el.remove());
      notes.filter(n => !n.archived).forEach((n, i) => {
        const el = document.createElement('div');
        ensureNoteFormat(n);
        el.className = `draggable-note draggable-note-color-${n.color}`;
        el.dataset.id = n.id;
        el.dataset.format = n.format;
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.style.width = (n.w || 220) + 'px';
        el.style.height = (n.h || 180) + 'px';
        el.style.zIndex = String(n.z || 60);
        el.style.setProperty('--note-scroll-thumb', darkenColor(n.color, 0.35));
        el.style.animationDelay = (i * 0.06) + 's';
        if (!n.visible) el.classList.add('hidden');

        const time = new Date(n.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        const dirs = ['n','s','e','w','ne','nw','se','sw'];
        const handleHTML = dirs.map(d => `<div class="note-resize-handle ${d}" data-resize="${n.id}" data-dir="${d}"></div>`).join('');
        el.innerHTML = `
          <button class="draggable-note-delete" data-id="${n.id}">✕</button>
          <button class="note-edit-btn" data-edit-id="${n.id}">✎</button>
          <button class="note-focus-btn" data-focus-id="${n.id}" title="Focus mode">⊙</button>
          <button class="note-tag-btn" data-tag-id="${n.id}" title="Tags">#</button>
          <div class="draggable-note-time">${time}</div>
          <div class="draggable-note-text ${n.format === 'markdown' ? 'note-markdown' : 'note-plain'}" data-text-id="${n.id}">${renderNoteContent(n)}</div>
          ${n.tags && n.tags.length ? `<div class="draggable-note-tags">${n.tags.map(t => `<span class="note-tag" data-tag-name="${t}">${escapeHtml(t)}<button class="note-tag-remove" data-tag-rm="${n.id}" data-tag-name="${t}">✕</button></span>`).join('')}</div>` : ''}
          ${handleHTML}`;

        el.addEventListener('mousedown', (e) => {
          if (e.target.closest('.draggable-note-delete') || e.target.closest('.note-resize-handle') || e.target.closest('.note-edit-btn') || e.target.closest('.note-focus-btn') || e.target.closest('.note-tag-btn')) return;
          if (e.target.closest('.draggable-note-text.editing')) return;
          if (e.button !== 0) return;

          const rect = el.getBoundingClientRect();
          dragPending = {
            el,
            startX: e.clientX,
            startY: e.clientY,
            origX: rect.left,
            origY: rect.top,
          };
        });

        el.querySelectorAll('.note-resize-handle').forEach(h => {
          h.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            bringNoteToFront(el);
            const rect = el.getBoundingClientRect();
            dragState = {
              type: 'resize', dir: h.dataset.dir, el,
              startX: e.clientX, startY: e.clientY,
              origW: rect.width, origH: rect.height,
              origX: rect.left, origY: rect.top,
            };
            el.classList.add('resizing');
          });
        });

        const textEl = el.querySelector('.draggable-note-text');
        textEl.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          if (!textEl.classList.contains('editing')) {
            enterEditMode(textEl);
          }
        });

        textEl.addEventListener('paste', (e) => {
          const files = e.clipboardData.files;
          for (const file of files) {
            if (file.type.startsWith('image/')) {
              e.preventDefault();
              handleImageFile(file, n.id);
              return;
            }
          }
        });

        textEl.addEventListener('dragover', (e) => {
          if (e.dataTransfer.types.includes('Files')) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
          }
        });

        textEl.addEventListener('drop', (e) => {
          const files = e.dataTransfer.files;
          for (const file of files) {
            if (file.type.startsWith('image/')) {
              e.preventDefault();
              handleImageFile(file, n.id);
              return;
            }
          }
        });

        document.body.appendChild(el);
      });
    }

    document.addEventListener('mousemove', (e) => {
      if (dragPending && !dragState) {
        const dx = e.clientX - dragPending.startX;
        const dy = e.clientY - dragPending.startY;
        if (Math.hypot(dx, dy) >= DRAG_THRESHOLD) {
          startNoteDrag(dragPending.el, dragPending.startX, dragPending.startY);
          clearDragPending();
        }
      }
      if (!dragState) return;
      if (dragState.type === 'move') {
        const dx = e.clientX - dragState.startX;
        const dy = e.clientY - dragState.startY;
        dragState.el.style.left = (dragState.origX + dx) + 'px';
        dragState.el.style.top = (dragState.origY + dy) + 'px';
      } else if (dragState.type === 'resize') {
        const dw = e.clientX - dragState.startX;
        const dh = e.clientY - dragState.startY;
        const dir = dragState.dir;
        const MIN_W = 80, MIN_H = 50;
        let newW, newH, newX, newY;
        if (dir.includes('e')) { newW = dragState.origW + dw; newX = dragState.origX; }
        if (dir.includes('w')) { newW = dragState.origW - dw; newX = dragState.origX + dw; }
        if (dir.includes('s')) { newH = dragState.origH + dh; newY = dragState.origY; }
        if (dir.includes('n')) { newH = dragState.origH - dh; newY = dragState.origY + dh; }
        if (!dir.includes('e') && !dir.includes('w')) { newW = dragState.origW; newX = dragState.origX; }
        if (!dir.includes('s') && !dir.includes('n')) { newH = dragState.origH; newY = dragState.origY; }
        if (newW < MIN_W) {
          if (dir.includes('w')) newX = dragState.origX + dragState.origW - MIN_W;
          newW = MIN_W;
        }
        if (newH < MIN_H) {
          if (dir.includes('n')) newY = dragState.origY + dragState.origH - MIN_H;
          newH = MIN_H;
        }
        dragState.el.style.left = newX + 'px';
        dragState.el.style.top = newY + 'px';
        dragState.el.style.width = newW + 'px';
        dragState.el.style.height = newH + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      clearDragPending();
      if (!dragState) return;
      dragState.el.classList.remove('dragging', 'resizing');
      const id = dragState.el.dataset.id;
      const note = notes.find(n => n.id === id);
      if (note) {
        note.x = parseFloat(dragState.el.style.left);
        note.y = parseFloat(dragState.el.style.top);
        if (dragState.type === 'resize') {
          note.w = parseFloat(dragState.el.style.width);
          note.h = parseFloat(dragState.el.style.height);
        }
        saveCanvasData();
      }
      dragState = null;
    });

    function execute(cmd) {
      if (!cmd._skipHistory) pushHistory(cmd.id);
      if (cmd.id === 'ask-ai' || cmd.isChat) {
        cmd.action();
        return;
      }
      closeSearch();
      setTimeout(() => cmd.action(), 200);
    }

            <div class="result-info">

            <div class="result-avatar" style="background:#bf5af2;font-size:16px">\u2728</div>
            <div class="result-info">
              <div class="result-title">Brainstorm Ideas</div>
              <div class="result-subtitle">Generate creative ideas based on your notes</div>
            </div>

      if (hasRecent) {

        html += recent.map((cmd, i) => `
          <li class="result-item" data-index="${i}" style="animation-delay: ${(canvasNoteCount ? 0.12 : 0) + i * 0.025}s">

            <div class="result-info">
              <div class="result-title">${cmd.title.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m] || m)}</div>

        html += `<li class="sidebar-section-header" style="padding:8px 16px 6px;border-bottom:0.5px solid var(--divider)"><span>Recent Notes</span></li>`;
        recentNotes.forEach((n, i) => {
          const colorMap = { yellow: '#fff3b0', green: '#b5e6b5', blue: '#b5d6f0', pink: '#f0c4d8', lavender: '#d4c4f0', peach: '#fad4b5', mint: '#b5e6d4', coral: '#f5b8b0' };
          const dotColor = colorMap[n.color] || colorMap.yellow;
          const displayText = getNotePreviewText(n);
          const time = new Date(n.created).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
          html += `

              <div class="note-color-dot" style="background:${dotColor}"></div>
              <div class="note-preview-text">${displayText.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m] || m)}</div>

    function render(query) {
      if (!query.trim()) {
        renderRecent();
        return;
      }

      currentResults = search(query);
      selectedIndex = -1;

      if (!currentResults.length) {
        renderEmptyState(true);
        return;
      }

      list.innerHTML = currentResults.map((cmd, i) => {
        const titleHtml = cmd.matchField === 'title'
          ? highlightPositions(cmd.title, cmd.matchPositions)
          : cmd.title.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m] || m);
        const subHtml = cmd.matchField === 'subtitle'
          ? highlightPositions(cmd.subtitle, cmd.matchPositions)
          : cmd.subtitle.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m] || m);

        return `
        <li class="result-item" data-index="${i}" style="animation-delay: ${i * 0.025}s">
          <div class="result-avatar" style="background:${cmd.color}">${cmd.icon}</div>
          <div class="result-info">
            <div class="result-title">${titleHtml}</div>
            <div class="result-subtitle">${subHtml}</div>
          </div>
          <div class="result-meta">
            ${cmd.isHistory ? '<span class="history-badge">recent</span>' : ''}
          <!--   <span class="result-score">${(cmd.fuzzyScore * 100).toFixed(0)}%</span> -->
          <!-- <span class="result-shortcut">${(cmd.shortcut||[]).map(k => `<kbd>${k}</kbd>`).join('')}</span> -->
          </div>
        </li>`;
      }).join('');

      list.classList.add('visible');
    }

    function updateActiveItem() {
      const items = list.querySelectorAll('.result-item');
      items.forEach((el, i) => el.classList.toggle('active', i === selectedIndex));
      if (selectedIndex >= 0 && items[selectedIndex]) {
        items[selectedIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    function selectItem(index) {
      const cmd = currentResults[index];
      if (!cmd) return;
      execute(cmd);
    }

    function tabComplete() {
      if (!currentResults.length) return;
      input.value = currentResults[0].title;
      input.setSelectionRange(input.value.length, input.value.length);
      render(input.value);
      selectedIndex = 0;
      updateActiveItem();
    }

    input.addEventListener('input', () => {
      render(input.value);
      clear.classList.toggle('visible', input.value.length > 0);
    });

    input.addEventListener('keydown', (e) => {
      const hasResults = list.classList.contains('visible') && currentResults.length > 0;
      const max = currentResults.length - 1;

      if (e.key === 'Tab' && hasResults) {
        e.preventDefault();
        tabComplete();
        return;
      }

      if (e.key === 'ArrowDown' && hasResults) {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, max);
        updateActiveItem();
      } else if (e.key === 'ArrowUp' && hasResults) {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, -1);
        updateActiveItem();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (selectedIndex < 0 && currentResults.length > 0) selectedIndex = 0;
        if (selectedIndex >= 0) selectItem(selectedIndex);
      } else if (e.key === 'Escape') {
        closeSearch();
      }
    });

    input.addEventListener('blur', () => {
      setTimeout(() => { if (!isOpen) return; list.classList.remove('visible'); }, 180);
    });

    input.addEventListener('focus', () => {
      if (!isOpen) return;
      if (input.value.trim()) render(input.value);
      else renderRecent();
    });

    function execActionItem(action) {
      const sc = slashCommands.find(c => c.id === action);
      if (sc && sc.canvasPrefix) {
        const notesText = getCanvasNotesText();
        if (notesText) {
          pushHistory(sc.id);
          doChatToNote(sc.canvasPrefix + notesText, sc.systemPrompt, sc.label);
        } else {
          showToast('\u26A0\uFE0F No notes with text on this canvas');
        }
        return;
      }
      showToast('\u26A0\uFE0F Action not available');
    }

    list.addEventListener('mousedown', (e) => {
      const actionItem = e.target.closest('[data-action]');
      if (actionItem && actionItem.dataset.action) {
        closeSearch();
        setTimeout(() => execActionItem(actionItem.dataset.action), 200);
        return;
      }
      const btn = e.target.closest('[data-chat-action]');
      if (btn) {
        const action = btn.dataset.chatAction;
        if (action === 'copy') {
          const text = list.querySelector('.chat-bubble.assistant')?.textContent || '';
          navigator.clipboard?.writeText(text.trim()).catch(() => {});
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        } else if (action === 'retry') {
          if (lastSlashCmd) {
            doChat(lastSlashCmd.prompt, lastSlashCmd.systemPrompt, lastSlashCmd.label);
          } else {
            const prompt = input.value.trim();
            if (prompt) doChat(prompt);
          }
        } else if (action === 'back') {
          lastSlashCmd = null;
          if (input.value.trim()) render(input.value);
          else renderRecent();
        }
        return;
      }
      const item = e.target.closest('.result-item');
      if (!item) return;
      selectItem(parseInt(item.dataset.index));
    });

    clear.addEventListener('click', () => {
      input.value = '';

      input.focus();
      clear.classList.remove('visible');

    });

    async function suggestTagsForNote(noteId) {
      const note = notes.find(n => n.id === noteId);
      if (!note || !(note.text || '').trim()) {
        showToast('\u26A0\uFE0F Note is empty, nothing to tag');
        return;
      }
      const suggestBtn = document.getElementById('tagPopupSuggest');
      suggestBtn.textContent = '...';
      suggestBtn.disabled = true;
      try {
        const res = await fetch(LLM_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: LLM_MODEL,
            messages: [
              { role: 'system', content: 'You are a tagging assistant. Suggest 2-5 short, relevant single-word tags for the given text. Return ONLY the tags as a comma-separated list, nothing else.' },
              { role: 'user', content: note.text },
            ],
            stream: false,
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const reply = (data.message?.content || data.response || '').trim();
        const tags = reply.split(',').map(t => t.trim().toLowerCase().replace(/[^a-zA-Z0-9 _-]/g, '')).filter(Boolean);
        tags.forEach(t => addTagToNote(noteId, t));
        showToast(`\u2728 Added ${tags.length} tag${tags.length > 1 ? 's' : ''}: ${tags.join(', ')}`);
      } catch (err) {
        showToast(`\u26A0\uFE0F Tag suggestion failed: ${err.message}`);
      } finally {
        suggestBtn.textContent = '\u2728';
        suggestBtn.disabled = false;
      }
    }

    document.getElementById('tagPopupInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const input = e.target;
        const tag = input.value.trim();
        if (tag && tagPopupNoteId) {
          addTagToNote(tagPopupNoteId, tag);
        }
      }
      if (e.key === 'Escape') {
        closeTagPopup();
      }
    });

    document.getElementById('tagPopupSuggest').addEventListener('click', () => {
      if (tagPopupNoteId) suggestTagsForNote(tagPopupNoteId);
    });

    function exitEditMode(textEl) {
      const noteEl = textEl.closest('.draggable-note');
      if (!noteEl) return;
      textEl.removeAttribute('contenteditable');
      textEl.classList.remove('editing', 'editing-markdown', 'editing-plain');
      const id = noteEl.dataset.id;
      const note = notes.find(n => n.id === id);
      if (note) {
        if (note.format === 'image') return;
        note.text = textEl.textContent || '';
        saveCanvasData();
        textEl.innerHTML = renderNoteContent(note);
      }
      const editBtn = noteEl.querySelector('.note-edit-btn');
      if (editBtn) editBtn.classList.remove('editing');
    }

    function enterEditMode(textEl) {
      const noteEl = textEl.closest('.draggable-note');
      if (!noteEl) return;
      const id = noteEl.dataset.id;
      const note = notes.find(n => n.id === id);
      if (!note) return;
      if (note.format === 'image') {
        showToast('\u26A0\uFE0F Image notes cannot be edited');
        return;
      }
      textEl.textContent = note.text || '';
      textEl.setAttribute('contenteditable', 'true');
      textEl.classList.add('editing', note.format === 'markdown' ? 'editing-markdown' : 'editing-plain');
      textEl.focus();
      const editBtn = noteEl.querySelector('.note-edit-btn');
      if (editBtn) editBtn.classList.add('editing');
    }

    function showNoteContextMenu(e, noteEl) {
      e.preventDefault();
      closeContextMenu();
      const noteId = noteEl.dataset.id;
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      const menu = document.getElementById('contextMenu');
      const cx = e.clientX, cy = e.clientY;

      let colorSwatches = '';
      noteColors.forEach(c => {
        const hex = NOTE_HEX_MAP[c];
        const active = c === note.color ? ' style="transform:scale(1.25);box-shadow:0 0 0 2px var(--accent)"' : '';
        colorSwatches += `<div class="note-ctx-color" data-color="${c}" style="background:${hex}"${active}></div>`;
      });

      let canvasItems = '';
      canvases.forEach(c => {
        const isCurrent = c.id === currentCanvasId;
        canvasItems += `<div class="context-menu-item context-menu-item-sm" data-canvas-move="${noteId}" data-target-canvas="${c.id}">${isCurrent ? '\u25CF' : '\u25CB'} ${escapeHtml(c.name)}</div>`;
      });

      const archiveLabel = note.archived ? '\uD83D\uDCE5 Restore' : 'Archive';
      const archiveAction = note.archived ? 'restore' : 'archive';

      menu.innerHTML = `
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);padding:4px 14px 6px;">Color</div>
        <div style="display:flex;gap:5px;padding:0 14px 10px;flex-wrap:wrap;">
          ${colorSwatches}
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-note-action="${archiveAction}" data-note-id="${noteId}">${archiveLabel}</div>
        <div class="context-menu-item" data-note-action="duplicate" data-note-id="${noteId}">Duplicate</div>
        <div class="context-menu-divider"></div>
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);padding:4px 14px 6px;">Move to Canvas</div>
        ${canvasItems}
      `;
      menu.dataset.noteCtx = noteId;
      const rect = menu.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 8;
      const maxY = window.innerHeight - rect.height - 8;
      menu.style.left = Math.min(cx, maxX) + 'px';
      menu.style.top = Math.min(cy, maxY) + 'px';
      menu.classList.add('visible');
    }

    document.addEventListener('contextmenu', (e) => {
      const noteEl = e.target.closest('.draggable-note');
      if (noteEl) {
        showNoteContextMenu(e, noteEl);
        return;
      }
      if (e.target.closest('.search-container') || e.target.closest('.notes-sidebar') || e.target.closest('.notes-sidebar-overlay') || e.target.closest('.confirm-dialog-overlay') || e.target.closest('.toast-container') || e.target.closest('.context-menu') || e.target.closest('.tag-popup')) return;
      showContextMenu(e);
    });

    document.addEventListener('click', async (e) => {
      const ctxMenu = document.getElementById('contextMenu');
      if (ctxMenu.classList.contains('visible')) {
        const canvasMoveItem = e.target.closest('[data-canvas-move]');
        if (canvasMoveItem) {
          const noteId = canvasMoveItem.dataset.canvasMove;
          const targetCanvasId = canvasMoveItem.dataset.targetCanvas;
          if (noteId && targetCanvasId && targetCanvasId !== currentCanvasId) {
            const noteIdx = notes.findIndex(n => n.id === noteId);
            if (noteIdx >= 0) {
              const [note] = notes.splice(noteIdx, 1);
              const target = canvases.find(c => c.id === targetCanvasId);
              if (target) {
                target.notes.unshift(note);
                saveCanvasData();
                renderStickyNotes();
                renderSidebar();
                showToast(`\uD83D\uDCCC Moved note to "${escapeHtml(target.name)}"`);
              }
            }
          }
          closeContextMenu();
          return;
        }
        const colorSwatch = e.target.closest('.note-ctx-color');
        if (colorSwatch) {
          const color = colorSwatch.dataset.color;
          const noteId = ctxMenu.dataset.noteCtx;
          if (color && noteId) {
            const note = notes.find(n => n.id === noteId);
            if (note) {
              note.color = color;
              saveCanvasData();
              renderStickyNotes();
              renderSidebar();
            }
          }
          closeContextMenu();
          return;
        }
        const noteActionItem = e.target.closest('[data-note-action]');
        if (noteActionItem) {
          const nid = noteActionItem.dataset.noteId;
          const naction = noteActionItem.dataset.noteAction;
          if (nid && naction === 'archive') archiveNote(nid);
          else if (nid && naction === 'restore') restoreNote(nid);
          else if (nid && naction === 'duplicate') duplicateNote(nid);
          closeContextMenu();
          return;
        }
        const item = e.target.closest('.context-menu-item');
        if (item) {
          const action = item.dataset.action;
          if (action === 'simple' || action === 'markdown') {
            const x = parseInt(item.dataset.x) - 30;
            const y = parseInt(item.dataset.y) - 20;
            const format = action === 'markdown' ? 'markdown' : 'plain';
            createNote(null, { format, startEditing: true, x, y });
          } else if (action === 'bg') {
            if (!sidebarOpen) openSidebar('notes');
            setTimeout(() => openColorPalette(currentCanvasId), 150);
          } else if (action === 'auto-layout') {
            autoLayoutNotes();
          }
          closeContextMenu();
          return;
        }
        if (!e.target.closest('.context-menu')) {
          closeContextMenu();
        }
      }
      if (e.target.id === 'canvasAddBtn') {
        const name = prompt('Canvas name:', 'Canvas ' + (canvases.length + 1));
        if (name && name.trim()) addCanvas(name.trim());
        return;
      }
      if (!e.target.closest('.color-palette-popup') && paletteOpen) {
        closeColorPalette();
      }
      const colorBtn = e.target.closest('.canvas-color-btn');
      if (colorBtn && colorBtn.dataset.colorId) {
        if (paletteOpen) { closeColorPalette(); return; }
        openColorPalette(colorBtn.dataset.colorId);
        return;
      }
      const paletteSwatch = e.target.closest('.color-palette-swatch');
      if (paletteSwatch && paletteSwatch.dataset.color && paletteTargetCanvas) {
        setCanvasBg(paletteTargetCanvas, paletteSwatch.dataset.color);
        closeColorPalette();
        return;
      }
      const editBtn = e.target.closest('.note-edit-btn');
      if (editBtn) {
        const noteEl = editBtn.closest('.draggable-note');
        if (!noteEl) return;
        const textEl = noteEl.querySelector('.draggable-note-text');
        if (!textEl) return;
        if (textEl.classList.contains('editing')) {
          exitEditMode(textEl);
        } else {
          enterEditMode(textEl);
        }
        return;
      }
      const toggleTrack = e.target.closest('.toggle-track');
      if (toggleTrack && toggleTrack.dataset.toggleId) {
        toggleNoteVisibility(toggleTrack.dataset.toggleId);
        return;
      }
      const renameBtn = e.target.closest('.canvas-rename-btn');
      if (renameBtn && renameBtn.dataset.renameId) {
        const cid = renameBtn.dataset.renameId;
        const item = renameBtn.closest('.canvas-item');
        const nameSpan = item?.querySelector('.canvas-name');
        if (item && nameSpan && !item.classList.contains('renaming')) {
          item.classList.add('renaming');
          const currentName = nameSpan.textContent;
          const input = document.createElement('input');
          input.type = 'text';
          input.className = 'canvas-rename-input';
          input.value = currentName;
          input.maxLength = 40;
          nameSpan.replaceWith(input);
          input.focus();
          input.select();
          const finishRename = (save) => {
            const val = input.value.trim();
            if (save && val && val !== currentName) {
              renameCanvas(cid, val);
            }
            const span = document.createElement('span');
            span.className = 'canvas-name';
            span.textContent = val || currentName;
            input.replaceWith(span);
            item.classList.remove('renaming');
          };
          input.addEventListener('blur', () => finishRename(true));
          input.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
            if (ev.key === 'Escape') { ev.preventDefault(); finishRename(false); }
          });
        }
        return;
      }
      const restoreBtn = e.target.closest('[data-restore-id]');
      if (restoreBtn && restoreBtn.dataset.restoreId) {
        restoreNote(restoreBtn.dataset.restoreId);
        return;
      }
      const deleteSidebar = e.target.closest('.item-delete-sidebar');
      if (deleteSidebar && deleteSidebar.dataset.deleteId) {
        requestDeleteNote(deleteSidebar.dataset.deleteId);
        return;
      }
      const focusBtn = e.target.closest('.note-focus-btn');
      if (focusBtn) {
        const id = focusBtn.dataset.focusId;
        if (focusModeNoteId === id) {
          exitFocusMode();
        } else {
          enterFocusMode(id);
        }
        return;
      }
      if (focusModeNoteId && !e.target.closest('.draggable-note.focused')) {
        exitFocusMode();
        return;
      }
      if (!e.target.closest('.tag-popup') && tagPopupNoteId) {
        closeTagPopup();
      }
      const tagRmBtn = e.target.closest('.note-tag-remove');
      if (tagRmBtn && tagRmBtn.dataset.tagRm) {
        removeTagFromNote(tagRmBtn.dataset.tagRm, tagRmBtn.dataset.tagName);
        return;
      }
      const tagBtn = e.target.closest('.note-tag-btn');
      if (tagBtn && tagBtn.dataset.tagId) {
        if (tagPopupNoteId === tagBtn.dataset.tagId) {
          closeTagPopup();
        } else {
          openTagPopup(tagBtn.dataset.tagId, tagBtn);
        }
        return;
      }
      const deleteBtn = e.target.closest('.draggable-note-delete');
      if (deleteBtn) {
        requestDeleteNote(deleteBtn.dataset.id);
        return;
      }
      const canvasDeleteBtn = e.target.closest('.canvas-delete-btn');
      if (canvasDeleteBtn && canvasDeleteBtn.dataset.canvasId) {
        const cid = canvasDeleteBtn.dataset.canvasId;
        const c = canvases.find(c => c.id === cid);
        if (c && canvases.length > 1) {
          const ok = await showConfirmDialog({
            title: 'Delete canvas?',
            message: `"${escapeHtml(c.name)}" and all its notes will be permanently removed.`,
            confirmLabel: 'Delete',
          });
          if (ok) removeCanvas(cid);
        }
        return;
      }
      const canvasItem = e.target.closest('.canvas-item');
      if (canvasItem && canvasItem.dataset.canvasId) {
        const cid = canvasItem.dataset.canvasId;
        if (cid !== currentCanvasId) {
          switchCanvas(cid);
        }
        return;
      }
      const previewItem = e.target.closest('[data-note-id]');
      if (previewItem && e.target.closest('.note-preview-item')) {
        if (isOpen) closeSearch();
        openSidebar('notes');
        return;
      }
      if (e.target.closest('.draggable-note-text.editing')) return;
      const editingText = document.querySelector('.draggable-note-text.editing');
      if (editingText && !e.target.closest('.draggable-note')) {
        exitEditMode(editingText);
      }
    });

    document.addEventListener('input', (e) => {
      const el = e.target.closest('.draggable-note-text');
      if (el) {
        const noteEl = el.closest('.draggable-note');
        if (noteEl) {
          const id = noteEl.dataset.id;
          const note = notes.find(n => n.id === id);
          if (note && el.classList.contains('editing')) {
            note.text = el.textContent || '';
            saveCanvasData();
          }
        }
        return;
      }
    });

    document.addEventListener('paste', (e) => {
      if (e.target.closest('input, textarea, [contenteditable]')) return;
      const files = e.clipboardData.files;
      for (const file of files) {
        if (file.type.startsWith('image/')) {
          e.preventDefault();
          const reader = new FileReader();
          reader.onload = (ev) => { createImageNote(ev.target.result); };
          reader.readAsDataURL(file);
          return;
        }
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('confirmDialogOverlay').classList.contains('visible')) {
        hideConfirmDialog(false);
        return;
      }
      if (e.key === 'Escape' && document.getElementById('contextMenu').classList.contains('visible')) {
        closeContextMenu();
        return;
      }
      if (e.key === 'Escape' && tagPopupNoteId) {
        closeTagPopup();
        return;
      }
      if (e.key === 'Escape' && paletteOpen) {
        closeColorPalette();
        return;
      }
      if (e.key === 'Escape' && currentFindQuery) {
        clearFindHighlights();
        return;
      }
      if (e.key === 'Escape' && focusModeNoteId) {
        exitFocusMode();
        return;
      }
      if (e.key === 'Escape' && sidebarOpen) {
        closeSidebar();
        return;
      }
      if (e.key === 'Tab' && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const now = Date.now();
        if (now - lastTabTime < 350) {
          e.preventDefault();
          if (isOpen) closeSearch();
          else openSearch();
          lastTabTime = 0;
          return;
        }
        lastTabTime = now;
      } else if (e.key !== 'Tab') {
        lastTabTime = 0;
      }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'p') {
        e.preventDefault();
        if (isOpen) closeSearch();
        else openSearch();
      }
      if (e.key === 'Escape' && isOpen) {
        closeSearch();
      }
    });

    const initialCanvas = getCurrentCanvas();
    if (initialCanvas && initialCanvas.bg) applyCanvasBg(initialCanvas.bg);
    renderStickyNotes();

    const canvasBg = document.getElementById('random-bg');
    canvasBg.addEventListener('dragover', (e) => {
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      }
    });
    canvasBg.addEventListener('drop', (e) => {
      e.preventDefault();
      const files = e.dataTransfer.files;
      for (const file of files) {
        if (file.type.startsWith('image/')) {
          const rect = canvasBg.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const reader = new FileReader();
          reader.onload = (ev) => { createImageNote(ev.target.result, x, y); };
          reader.readAsDataURL(file);
          return;
        }
      }
    });
  </script>
  </body>
  </html>
