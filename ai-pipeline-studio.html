import pandas as pd
from bs4 import BeautifulSoup
import json
from datetime import datetime

class DataCollector:
    def __init__(self, config):
        self.config = config
        self.session = requests.Session()
        self.session.headers.update({
            'User-Agent': 'AI-Pipeline/1.0'
        })
    
    def fetch_from_api(self, endpoint, params=None):
        """Fetch data from REST API"""
        response = self.session.get(
            f"{self.config['api_base']}/{endpoint}",
            params=params,
            headers={'Authorization': f"Bearer {self.config['api_key']}"}
        )
        response.raise_for_status()
        return response.json()
    
    def scrape_web(self, urls):
        """Scrape data from web pages"""
        data = []
        for url in urls:
            response = self.session.get(url)
            soup = BeautifulSoup(response.text, 'html.parser')
            data.append({
                'url': url,
                'title': soup.title.string,
                'content': soup.get_text()[:1000],
                'timestamp': datetime.now().isoformat()
            })
        return pd.DataFrame(data)
    
    def load_csv(self, file_path):
        """Load data from CSV files"""
        df = pd.read_csv(file_path)
        print(f"Loaded {len(df)} records from {file_path}")

    def collect_all(self):
        """Main collection orchestration"""

import numpy as np
from sklearn.preprocessing import StandardScaler, LabelEncoder
from sklearn.impute import SimpleImputer
from sklearn.compose import ColumnTransformer
from sklearn.pipeline import Pipeline

class DataPreprocessor:
    def __init__(self):
        self.numeric_features = ['age', 'income', 'score', 'count']
        self.categorical_features = ['category', 'region', 'type']
        
        self.numeric_transformer = Pipeline(steps=[
            ('imputer', SimpleImputer(strategy='median')),
            ('scaler', StandardScaler())
        ])
        
        self.categorical_transformer = Pipeline(steps=[
            ('imputer', SimpleImputer(strategy='most_frequent')),
            ('encoder', LabelEncoder())
        ])
        
        self.preprocessor = ColumnTransformer(
            transformers=[
                ('num', self.numeric_transformer, self.numeric_features),
                ('cat', self.categorical_transformer, self.categorical_features)
            ])
    
    def remove_outliers(self, df, columns, threshold=3):
        """Remove outliers using Z-score"""
        mask = pd.Series(True, index=df.index)
        for col in columns:
            z_scores = np.abs((df[col] - df[col].mean()) / df[col].std())
            mask &= (z_scores < threshold)
        removed = (~mask).sum()
        print(f"Removed {removed} outliers")
        return df[mask]
    
    def feature_engineering(self, df):
        """Create new features from existing data"""
        df['age_group'] = pd.cut(df['age'], bins=[0, 18, 35, 50, 65, 100])
        df['income_per_capita'] = df['income'] / df['count']
        df['score_normalized'] = (df['score'] - df['score'].min()) / \
                                  (df['score'].max() - df['score'].min())
        return df
    
    def preprocess(self, raw_data):
        """Full preprocessing pipeline"""
        df = raw_data.copy()
        
        print(f"Initial shape: {df.shape}")
        print(f"Missing values: {df.isnull().sum().sum()}")
        
        df = self.remove_outliers(df, self.numeric_features)
        df = self.feature_engineering(df)
        
        X = df.drop('target', axis=1)
        y = df['target']
        
        X_processed = self.preprocessor.fit_transform(X)
        
        print(f"Processed shape: {X_processed.shape}")
        print(f"Features: {X_processed.shape[1]}")
        
        return X_processed, y

from scipy import stats

class DataValidator:
    def __init__(self):
        self.checks = []
    
    def check_missing_values(self, df, threshold=0.05):
        """Check for excessive missing values"""
        missing_pct = df.isnull().sum() / len(df)
        cols_with_excessive_missing = missing_pct[missing_pct > threshold]
        
        if len(cols_with_excessive_missing) > 0:
            print(f"WARNING: Columns with >{threshold*100}% missing:")
            for col, pct in cols_with_excessive_missing.items():
                print(f"  {col}: {pct:.2%}")
        return len(cols_with_excessive_missing) == 0
    
    def check_distribution(self, df, column, expected_dist='normal'):
        """Statistical distribution check"""
        if expected_dist == 'normal':

            print(f"Normality test for {column}: p={p_value:.4f} {'PASS' if is_normal else 'FAIL'}")

    def check_data_types(self, df, expected_types):
        """Validate column data types"""
        for col, expected_type in expected_types.items():
            actual_type = str(df[col].dtype)
            match = expected_type in actual_type
            status = "PASS" if match else "FAIL"
            print(f"Type check {col}: expected={expected_type}, actual={actual_type} [{status}]")
    
    def run_all_checks(self, df):

            'income': 'float',
            'category': 'object'
        })

        print("Validation complete!")

<span class="info">Monitoring: http://localhost:3000</span>
<span class="success">Pipeline execution finished successfully!</span>`
            }
        ];

        let currentStep = 0;
        let currentTab = 0;
        let completedSteps = new Set();

        function renderPipelineSteps() {
            const container = document.getElementById('pipelineSteps');
            container.innerHTML = '';
            
            pipelineData.forEach((step, index) => {
                const isActive = index === currentStep;
                const isCompleted = completedSteps.has(index);
                
                container.innerHTML += `
                    <div class="pipeline-step ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" onclick="selectStep(${index})">
                        <div class="step-number">${isCompleted ? '&#10003;' : index + 1}</div>
                        <div class="step-info">
                            <h3>${step.name}</h3>
                            <p>${step.description.substring(0, 35)}...</p>
                        </div>
                    </div>
                    ${index < pipelineData.length - 1 ? `<div class="step-connector ${isCompleted ? 'completed' : ''}"></div>` : ''}
                `;
            });
        }

        function renderVisualFlow() {
            const container = document.getElementById('visualFlow');
            container.innerHTML = '';
            
            pipelineData.forEach((step, index) => {
                const isActive = index === currentStep;
                const isCompleted = completedSteps.has(index);
                
                container.innerHTML += `<div class="flow-node ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}">${step.name}</div>`;
                
                if (index < pipelineData.length - 1) {
                    container.innerHTML += `<span class="flow-arrow">&#10140;</span>`;
                }
            });
        }

        function renderStats() {
            const container = document.getElementById('statsGrid');
            const stats = pipelineData[currentStep].stats;
            
            container.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <h4>${stat.label}</h4>
                    <div class="value">${stat.value}</div>
                    <div class="subtext">${stat.subtext}</div>
                </div>
            `).join('');
        }

        function renderEditorTabs() {
            const container = document.getElementById('editorTabs');
            const tabs = pipelineData[currentStep].tabs;
            
            container.innerHTML = tabs.map((tab, index) => `
                <div class="editor-tab ${index === currentTab ? 'active' : ''}" onclick="selectTab(${index})">${tab.name}</div>
            `).join('');
        }

        function renderEditor() {
            const tab = pipelineData[currentStep].tabs[currentTab];
            document.getElementById('codeEditor').value = tab.code;
            document.getElementById('editorFilename').textContent = tab.filename;
            document.getElementById('outputContent').innerHTML = '<span class="info">// Click "Run" to execute the code...</span>';
        }

        function updateProgress() {
            const progress = Math.round((completedSteps.size / pipelineData.length) * 100);
            document.getElementById('progressPercentage').textContent = progress + '%';
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function selectStep(index) {
            currentStep = index;
            currentTab = 0;
            
            document.getElementById('stepTitle').textContent = pipelineData[index].name;
            document.getElementById('stepDescription').textContent = pipelineData[index].description;
            
            renderPipelineSteps();
            renderVisualFlow();
            renderStats();
            renderEditorTabs();
            renderEditor();
        }

        function selectTab(index) {
            currentTab = index;
            renderEditorTabs();
            renderEditor();
        }

        function runCode() {
            const output = document.getElementById('outputContent');
            output.innerHTML = '<span class="info running">Executing code...</span>';
            
            setTimeout(() => {
                output.innerHTML = pipelineData[currentStep].output;
                completedSteps.add(currentStep);
                updateProgress();
                renderPipelineSteps();
                renderVisualFlow();
            }, 1500);
        }

        function copyCode() {
            const code = document.getElementById('codeEditor').value;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.editor-btn-copy');
                const original = btn.innerHTML;
                btn.innerHTML = '&#10003; Copied!';
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        function runFullPipeline() {
            let step = 0;
            
            function runNextStep() {
                if (step >= pipelineData.length) {
                    return;
                }
                
                selectStep(step);
                completedSteps.add(step);
                updateProgress();
                renderPipelineSteps();
                renderVisualFlow();
                
                const output = document.getElementById('outputContent');
                output.innerHTML = '<span class="info running">Executing step...</span>';
                
                setTimeout(() => {
                    output.innerHTML = pipelineData[step].output;
                    step++;
                    
                    if (step < pipelineData.length) {
                        setTimeout(runNextStep, 2000);
                    }
                }, 1000);
            }
            
            runNextStep();
        }

        function resetPipeline() {
            currentStep = 0;
            currentTab = 0;
            completedSteps.clear();
            selectStep(0);
            updateProgress();
        }

        // Handle tab key in editor
        document.getElementById('codeEditor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // Initialize
        renderPipelineSteps();
        renderVisualFlow();
        renderStats();
        renderEditorTabs();
        renderEditor();
        updateProgress();
    </script>
</body>
</html>
